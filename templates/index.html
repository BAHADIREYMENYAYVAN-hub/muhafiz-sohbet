<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#202c33">
    <link rel="manifest" href="/manifest.json">
    <title>Muhafız Grup</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b141a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #202c33; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3b4a54; }
        .logout { background: #ea4335; color: white; text-decoration: none; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #1f2c33; padding: 10px; border-radius: 10px; max-width: 80%; align-self: flex-start; }
        .user-name { color: #00a884; font-size: 12px; font-weight: bold; }
        .input-area { background: #202c33; padding: 10px; display: flex; gap: 10px; align-items: center; }
        #m { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #2a3942; color: white; outline: none; }
        .send-btn { background: #00a884; border: none; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <span>🛡️ <b>TEVHİT MUHAFIZLARI</b></span>
        <a href="/logout" class="logout">ÇIKIŞ</a>
    </div>
    <div id="chat"></div>
    <div class="input-area">
        <input type="file" id="f" style="display:none" onchange="up()">
        <button onclick="document.getElementById('f').click()" style="background:none; border:none; cursor:pointer; font-size:20px;">📁</button>
        <input type="text" id="m" placeholder="Mesaj yaz..." onkeypress="if(event.key==='Enter') send()">
        <button class="send-btn" onclick="send()">GÖNDER</button>
    </div>

    <script>
        var socket = io();
        var user = "{{ username }}";
        socket.on('message', function(data) {
            var d = document.createElement('div');
            d.className = 'msg';
            if(data.name === '🛡️ Muhafız') d.style.background = '#054740';
            d.innerHTML = `<div class="user-name">${data.name}</div><div>${data.msg}</div>`;
            document.getElementById('chat').appendChild(d);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        });
        function send() {
            var i = document.getElementById('m');
            if(i.value.trim() !== "") {
                socket.emit('message', {name: user, msg: i.value});
                i.value = "";
            }
        }
        function up() {
            var fd = new FormData();
            fd.append('file', document.getElementById('f').files[0]);
            fetch('/upload', {method:'POST', body:fd});
        }
    </script>
</body>
</html>
