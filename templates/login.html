<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00a884">
    <link rel="manifest" href="/manifest.json">
    <title>Giriş | Tevhit Muhafızları</title>
    <style>
        body { background: #0b141a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #1f2c33; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 300px; border-top: 5px solid #00a884; }
        h2 { color: #00a884; margin-bottom: 20px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 12px; color: #00a884; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #2a3942; background: #2a3942; color: white; box-sizing: border-box; outline: none; }
        button { background: #00a884; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .footer { margin-top: 20px; font-size: 10px; color: #667781; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🛡️ Muhafız Paneli</h2>
        <form action="/login" method="post">
            <div class="input-group">
                <label>KULLANICI ADI</label>
                <input type="text" name="username" placeholder="Kullanıcı adın..." required>
            </div>
            <div class="input-group">
                <label>ŞİFRE</label>
                <input type="password" name="password" placeholder="••••" required>
            </div>
            <button type="submit">UYGULAMAYA GİRİŞ YAP</button>
        </form>
        <div class="footer">Tevhit Muhafızları © 2026</div>
    </div>
</body>
</html>
